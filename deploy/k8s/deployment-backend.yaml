apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-server
  namespace: room-booking
spec:
  replicas: 3
  selector:
    matchLabels:
      app: booking-server
  template:
    metadata:
      labels:
        app: booking-server
    spec:
      containers:
        - name: booking-server
          image: your-registry/booking-server:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: booking-config
            - secretRef:
                name: booking-secret
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
