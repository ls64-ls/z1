server:
  port: 8088

spring:
  application:
    name: booking-server
  datasource:
    url: jdbc:postgresql://localhost:5434/room_booking
    username: dev
    password: dev123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
  data:
    redis:
      host: localhost
      port: 6380
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: false

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.example.booking.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production}
  expiration: 7200

wechat:
  miniapp:
    appid: ${WX_APPID:wx801379289235bba3}
    secret: ${WX_SECRET:aa06d76ae017a47600ebe4fa82780c5b}

logging:
  level:
    com.example.booking: DEBUG
